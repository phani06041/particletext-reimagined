<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">ParticleText Reimagined Preview</title>
  <desc id="desc">Gradient showcase card for the ParticleText Reimagined project.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06101d" />
      <stop offset="55%" stop-color="#0b1830" />
      <stop offset="100%" stop-color="#13223d" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9effd2" />
      <stop offset="100%" stop-color="#42f5b9" />
    </linearGradient>
    <radialGradient id="glowA" cx="25%" cy="18%" r="45%">
      <stop offset="0%" stop-color="#42f5b9" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#42f5b9" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="80%" cy="25%" r="38%">
      <stop offset="0%" stop-color="#5cf2ff" stop-opacity="0.32" />
      <stop offset="100%" stop-color="#5cf2ff" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" rx="36" />
  <rect width="1200" height="630" fill="url(#glowA)" rx="36" />
  <rect width="1200" height="630" fill="url(#glowB)" rx="36" />

